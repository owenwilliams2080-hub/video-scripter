<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Video Scripter</title>
<style>
  :root {
    --bg: #ffffff;
    --panel: #f6f8fa;
    --panel-2: #ffffff;
    --border: #d8dee4;
    --text: #1f2328;
    --muted: #656d76;
    --accent: #0d7bff;
    --accent-soft: #0d7bff14;
    --idea: #afb8c1;
    --scripting: #d29922;
    --filmed: #2da44e;
    --posted: #8250df;
    --danger: #cf222e;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    height: 100vh;
    overflow: hidden;
  }
  button { font-family: inherit; cursor: pointer; }

  /* Sidebar */
  .sidebar {
    width: 320px;
    min-width: 320px;
    border-right: 1px solid var(--border);
    background: var(--panel);
    display: flex;
    flex-direction: column;
  }
  .sidebar-header {
    padding: 16px;
    border-bottom: 1px solid var(--border);
  }
  .brand {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: .3px;
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 14px;
  }
  .brand .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--accent); }
  .new-btn {
    width: 100%;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 10px;
    font-size: 14px;
    font-weight: 600;
  }
  .new-btn:hover { filter: brightness(1.1); }
  .search {
    width: 100%;
    margin-top: 10px;
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 10px;
    color: var(--text);
    font-size: 13px;
  }
  .search::placeholder { color: var(--muted); }

  .list { flex: 1; overflow-y: auto; padding: 8px; }
  .empty-list { color: var(--muted); font-size: 13px; text-align: center; padding: 30px 16px; line-height: 1.5; }

  .card {
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 11px 12px;
    margin-bottom: 8px;
    transition: border-color .12s;
  }
  .card:hover { border-color: #afb8c1; }
  .card.active { border-color: var(--accent); background: var(--accent-soft); }
  .card-title {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 7px;
    word-break: break-word;
    line-height: 1.3;
  }
  .card-title.untitled { color: var(--muted); font-weight: 500; font-style: italic; }
  .card-meta { display: flex; align-items: center; gap: 8px; }
  .badge {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .4px;
    padding: 2px 8px;
    border-radius: 20px;
    color: #0e1116;
  }
  .badge.idea { background: var(--idea); }
  .badge.scripting { background: var(--scripting); }
  .badge.filmed { background: var(--filmed); }
  .badge.posted { background: var(--posted); }
  .card-date { font-size: 11px; color: var(--muted); margin-left: auto; }

  .sidebar-footer {
    border-top: 1px solid var(--border);
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--muted);
  }
  .sidebar-footer .email { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .signout {
    background: none; border: none; color: var(--accent);
    font-size: 12px; font-weight: 600; padding: 0;
  }
  .sync-dot { color: var(--muted); font-size: 11px; }

  /* Editor */
  .editor { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .editor-empty {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    color: var(--muted); gap: 10px; text-align: center; padding: 40px;
  }
  .editor-empty .big { font-size: 17px; color: var(--text); font-weight: 600; }
  .editor-scroll { flex: 1; overflow-y: auto; padding: 28px 36px 60px; }
  .editor-inner { max-width: 760px; margin: 0 auto; }

  .title-input {
    width: 100%;
    background: transparent;
    border: none;
    color: var(--text);
    font-size: 26px;
    font-weight: 700;
    padding: 0 0 14px;
    outline: none;
  }
  .title-input::placeholder { color: #8b95a1; }

  .toolbar { display: flex; align-items: center; gap: 10px; margin-bottom: 26px; flex-wrap: wrap; }
  .status-group { display: flex; gap: 6px; background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 4px; }
  .status-opt {
    border: none; background: transparent; color: var(--muted);
    font-size: 12px; font-weight: 600; padding: 5px 11px; border-radius: 6px;
    text-transform: capitalize;
  }
  .status-opt.sel { color: #0e1116; }
  .status-opt.sel.idea { background: var(--idea); }
  .status-opt.sel.scripting { background: var(--scripting); }
  .status-opt.sel.filmed { background: var(--filmed); }
  .status-opt.sel.posted { background: var(--posted); }

  .spacer { flex: 1; }
  .ghost-btn {
    background: var(--panel); border: 1px solid var(--border); color: var(--text);
    font-size: 13px; font-weight: 600; padding: 7px 13px; border-radius: 8px;
  }
  .ghost-btn:hover { border-color: #afb8c1; }
  .ghost-btn.danger { color: var(--danger); }
  .ghost-btn.danger:hover { border-color: var(--danger); }

  .section { margin-bottom: 22px; }
  .section-label {
    font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .6px;
    color: var(--accent); margin-bottom: 8px; display: flex; align-items: center; gap: 8px;
  }
  .section-label .hint { color: var(--muted); font-weight: 500; text-transform: none; letter-spacing: 0; font-size: 11px; }
  textarea {
    width: 100%;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: inherit;
    font-size: 15px;
    line-height: 1.6;
    padding: 13px 15px;
    resize: none;
    overflow: hidden;
    outline: none;
  }
  textarea:focus { border-color: var(--accent); }
  textarea::placeholder { color: #8b95a1; }
  .concept-area { min-height: 60px; }
  .hook-area { min-height: 70px; }
  .body-area { min-height: 220px; }
  .cta-area  { min-height: 70px; }

  /* Login gate */
  .gate {
    position: fixed; inset: 0; z-index: 50;
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    padding: 24px;
  }
  .gate-card {
    width: 100%; max-width: 380px; text-align: center;
  }
  .gate .brand { justify-content: center; font-size: 17px; margin-bottom: 6px; }
  .gate .sub { color: var(--muted); font-size: 13px; margin-bottom: 22px; line-height: 1.5; }
  .gate input {
    width: 100%; background: var(--panel); border: 1px solid var(--border);
    border-radius: 8px; padding: 11px 13px; font-size: 15px; color: var(--text);
    outline: none; margin-bottom: 10px;
  }
  .gate input:focus { border-color: var(--accent); }
  .gate .new-btn { padding: 11px; font-size: 15px; }
  .gate-msg { margin-top: 16px; font-size: 13px; line-height: 1.5; }
  .gate-msg.ok { color: var(--filmed); }
  .gate-msg.err { color: var(--danger); }
  .hidden { display: none !important; }

  /* folder groups in sidebar */
  .folder-head {
    display: flex; align-items: center; gap: 6px;
    padding: 10px 8px 6px; cursor: pointer; user-select: none;
    font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px;
    color: var(--muted);
  }
  .folder-head:hover { color: var(--text); }
  .folder-head .chev { width: 10px; font-size: 9px; }
  .folder-head .count {
    margin-left: auto; background: var(--border); color: var(--muted);
    font-weight: 700; border-radius: 20px; padding: 1px 7px; font-size: 10px;
  }
  .card .star { color: #e3b341; margin-right: 5px; }

  /* star toggle in editor */
  .star-btn {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 8px; font-size: 16px; line-height: 1; color: #c2cad3;
    padding: 6px 10px;
  }
  .star-btn:hover { border-color: #afb8c1; }
  .star-btn.on { color: #e3b341; border-color: #e3b341; background: #e3b3411a; }

  /* folder picker */
  .folder-row { display: flex; align-items: center; gap: 8px; margin: -10px 0 22px; }
  .folder-row .fl { font-size: 15px; }
  .folder-input {
    flex: 1; max-width: 300px;
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 8px; padding: 8px 11px; font-size: 13px; color: var(--text); outline: none;
  }
  .folder-input:focus { border-color: var(--accent); }
  .folder-input::placeholder { color: #8b95a1; }

  /* scrollbars */
  ::-webkit-scrollbar { width: 10px; }
  ::-webkit-scrollbar-thumb { background: #d0d7de; border-radius: 6px; }
  ::-webkit-scrollbar-thumb:hover { background: #afb8c1; }
</style>
</head>
<body>
  <!-- Login gate (shown until signed in) -->
  <div class="gate" id="gate">
    <div class="gate-card">
      <div class="brand"><span class="dot"></span> Video Scripter</div>
      <div class="sub">Sign in to load your video ideas. They sync across every device you log in on.</div>
      <input id="emailInput" type="email" placeholder="you@email.com" autocomplete="email" />
      <button class="new-btn" id="loginBtn">Email me a sign-in link</button>
      <div class="gate-msg" id="gateMsg"></div>
    </div>
  </div>

  <aside class="sidebar hidden" id="sidebar">
    <div class="sidebar-header">
      <div class="brand"><span class="dot"></span> Video Scripter</div>
      <button class="new-btn" id="newBtn">+ New video idea</button>
      <input class="search" id="search" placeholder="Search ideas…" />
    </div>
    <div class="list" id="list"></div>
    <div class="sidebar-footer">
      <span class="email" id="userEmail"></span>
      <span class="sync-dot" id="syncDot"></span>
      <button class="signout" id="signoutBtn">Sign out</button>
    </div>
  </aside>

  <main class="editor hidden" id="editor"></main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(function () {
  "use strict";

  // ---- backend config ----
  var SUPABASE_URL = "https://oujcaejauqbilvsebtry.supabase.co";
  var SUPABASE_KEY = "sb_publishable_rhE_ITmQ_x7bmYZwY4sdeQ_ZhEIgQ6F";
  var sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  var STATUSES = ["idea", "scripting", "filmed", "posted"];
  var FIELDS = ["title", "status", "concept", "hook", "body", "cta"];

  var state = { videos: [], selectedId: null, query: "", user: null };

  function uid() {
    return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
  }
  function now() { return Date.now(); }
  function fmtDate(ts) {
    var d = new Date(ts);
    return d.toLocaleDateString(undefined, { month: "short", day: "numeric" });
  }
  function selected() {
    return state.videos.find(function (v) { return v.id === state.selectedId; }) || null;
  }

  // collapsed folder state (per browser)
  var collapsed = {};
  (function () {
    try {
      var r = localStorage.getItem("vs:collapsed");
      var a = r ? JSON.parse(r) : [];
      if (Array.isArray(a)) a.forEach(function (f) { collapsed[f] = true; });
    } catch (e) {}
  })();
  function toggleCollapse(name) {
    collapsed[name] = !collapsed[name];
    try {
      var keep = Object.keys(collapsed).filter(function (k) { return collapsed[k]; });
      localStorage.setItem("vs:collapsed", JSON.stringify(keep));
    } catch (e) {}
    renderList();
  }
  function folderNames() {
    var seen = {}, out = [];
    state.videos.forEach(function (v) {
      var f = (v.folder || "").trim();
      if (f && !seen[f]) { seen[f] = true; out.push(f); }
    });
    return out.sort(function (a, b) { return a.toLowerCase().localeCompare(b.toLowerCase()); });
  }

  // ---- sync indicator ----
  var syncDot = document.getElementById("syncDot");
  var pending = 0;
  function syncStart() { pending++; syncDot.textContent = "saving…"; }
  function syncDone() { pending = Math.max(0, pending - 1); if (pending === 0) syncDot.textContent = "saved"; }
  function syncErr() { pending = Math.max(0, pending - 1); syncDot.textContent = "save failed — check connection"; }

  // ---- backend ops ----
  function rowToVideo(r) {
    return {
      id: r.id, title: r.title || "", status: r.status || "idea",
      concept: r.concept || "", hook: r.hook || "", body: r.body || "",
      cta: r.cta || "", created: Number(r.created) || 0, updated: Number(r.updated) || 0,
      starred: !!r.starred, folder: r.folder || ""
    };
  }

  function loadVideos() {
    return sb.from("video_scripter_videos").select("*").order("updated", { ascending: false })
      .then(function (res) {
        if (res.error) throw res.error;
        state.videos = (res.data || []).map(rowToVideo);
      });
  }

  // Pull any NEW ideas from ideas.json into this account (never re-adds deleted ones).
  function seedFromRepo() {
    if (!window.fetch) return Promise.resolve();
    var seededSet = {};
    return sb.from("video_scripter_seeded").select("seed_id")
      .then(function (res) {
        if (res.error) throw res.error;
        (res.data || []).forEach(function (r) { seededSet[r.seed_id] = true; });
        return fetch("ideas.json", { cache: "no-store" });
      })
      .then(function (r) { return r && r.ok ? r.json() : null; })
      .then(function (data) {
        if (!data || !Array.isArray(data.ideas)) return;
        var fresh = data.ideas.filter(function (it) { return it && it.id && !seededSet[it.id]; });
        if (!fresh.length) return;
        var base = now();
        var rows = fresh.map(function (it, idx) {
          return {
            user_id: state.user.id,
            id: it.id,
            title: it.title || "",
            status: STATUSES.indexOf(it.status) !== -1 ? it.status : "idea",
            concept: it.concept || "",
            hook: it.hook || "",
            body: it.body || "",
            cta: it.cta || "",
            folder: it.folder || "",
            starred: false,
            created: base + idx,
            updated: base + idx
          };
        });
        var marks = fresh.map(function (it) { return { user_id: state.user.id, seed_id: it.id }; });
        return sb.from("video_scripter_videos").upsert(rows, { onConflict: "user_id,id", ignoreDuplicates: true })
          .then(function (r1) {
            if (r1.error) throw r1.error;
            return sb.from("video_scripter_seeded").upsert(marks, { onConflict: "user_id,seed_id", ignoreDuplicates: true });
          })
          .then(function (r2) { if (r2.error) throw r2.error; });
      })
      .catch(function (e) { /* offline / file missing — skip seeding */ });
  }

  function createVideo() {
    var cur = selected();
    var inheritFolder = cur ? (cur.folder || "") : "";
    var v = {
      id: uid(), title: "", status: "idea",
      concept: "", hook: "", body: "", cta: "",
      created: now(), updated: now(), starred: false, folder: inheritFolder
    };
    state.videos.unshift(v);
    state.selectedId = v.id;
    renderAll();
    var t = document.querySelector(".title-input");
    if (t) t.focus();
    syncStart();
    sb.from("video_scripter_videos").insert({
      user_id: state.user.id, id: v.id, title: "", status: "idea",
      concept: "", hook: "", body: "", cta: "", created: v.created, updated: v.updated,
      starred: false, folder: inheritFolder
    }).then(function (r) { r.error ? syncErr() : syncDone(); });
  }

  function deleteVideo(id) {
    state.videos = state.videos.filter(function (v) { return v.id !== id; });
    if (state.selectedId === id) state.selectedId = state.videos[0] ? state.videos[0].id : null;
    renderAll();
    syncStart();
    sb.from("video_scripter_videos").delete().eq("id", id)
      .then(function (r) { r.error ? syncErr() : syncDone(); });
  }

  // debounced field save
  var saveTimers = {};
  function patch(field, value) {
    var v = selected();
    if (!v) return;
    v[field] = value;
    v.updated = now();
    var id = v.id;
    if (saveTimers[id]) clearTimeout(saveTimers[id]);
    syncDot.textContent = "saving…";
    saveTimers[id] = setTimeout(function () {
      delete saveTimers[id];
      var cur = state.videos.find(function (x) { return x.id === id; });
      if (!cur) return;
      var update = { updated: cur.updated };
      update[field] = cur[field];
      syncStart();
      sb.from("video_scripter_videos").update(update).eq("id", id)
        .then(function (r) { r.error ? syncErr() : syncDone(); });
    }, 600);
  }

  // ---- rendering ----
  var listEl = document.getElementById("list");
  var editorEl = document.getElementById("editor");

  function visibleVideos() {
    var q = state.query.trim().toLowerCase();
    if (!q) return state.videos;
    return state.videos.filter(function (v) {
      return (v.title + " " + (v.concept || "") + " " + v.hook + " " + v.body + " " + v.cta).toLowerCase().indexOf(q) !== -1;
    });
  }

  function makeCard(v) {
    var card = document.createElement("div");
    card.className = "card" + (v.id === state.selectedId ? " active" : "");
    card.onclick = function () { state.selectedId = v.id; renderAll(); };

    var title = document.createElement("div");
    title.className = "card-title" + (v.title.trim() ? "" : " untitled");
    if (v.starred) {
      var st = document.createElement("span");
      st.className = "star";
      st.textContent = "★";
      title.appendChild(st);
    }
    title.appendChild(document.createTextNode(v.title.trim() || "Untitled idea"));

    var meta = document.createElement("div");
    meta.className = "card-meta";
    var badge = document.createElement("span");
    badge.className = "badge " + v.status;
    badge.textContent = v.status;
    var date = document.createElement("span");
    date.className = "card-date";
    date.textContent = fmtDate(v.updated);
    meta.appendChild(badge);
    meta.appendChild(date);

    card.appendChild(title);
    card.appendChild(meta);
    return card;
  }

  // starred first, then most-recently-updated
  function byStarThenDate(a, b) {
    var sa = a.starred ? 1 : 0, sb = b.starred ? 1 : 0;
    if (sa !== sb) return sb - sa;
    return b.updated - a.updated;
  }

  function renderList() {
    var vids = visibleVideos();
    listEl.innerHTML = "";
    if (state.videos.length === 0) {
      var e = document.createElement("div");
      e.className = "empty-list";
      e.textContent = "No videos yet. Hit “+ New video idea” to start planning.";
      listEl.appendChild(e);
      return;
    }
    if (vids.length === 0) {
      var n = document.createElement("div");
      n.className = "empty-list";
      n.textContent = "No matches.";
      listEl.appendChild(n);
      return;
    }

    // while searching, ignore collapse so matches are always visible
    var forceOpen = state.query.trim() !== "";

    // group by folder
    var groups = {};
    vids.forEach(function (v) {
      var k = (v.folder || "").trim();
      (groups[k] = groups[k] || []).push(v);
    });
    var names = Object.keys(groups).sort(function (a, b) {
      if (a === "") return 1;   // "No folder" sinks to the bottom
      if (b === "") return -1;
      return a.toLowerCase().localeCompare(b.toLowerCase());
    });

    names.forEach(function (name) {
      var items = groups[name].slice().sort(byStarThenDate);
      var isOpen = forceOpen || !collapsed[name];

      var head = document.createElement("div");
      head.className = "folder-head";
      var chev = document.createElement("span");
      chev.className = "chev";
      chev.textContent = isOpen ? "▾" : "▸";
      var lbl = document.createElement("span");
      lbl.textContent = name || "No folder";
      var cnt = document.createElement("span");
      cnt.className = "count";
      cnt.textContent = items.length;
      head.appendChild(chev);
      head.appendChild(lbl);
      head.appendChild(cnt);
      head.onclick = function () { if (!forceOpen) toggleCollapse(name); };
      listEl.appendChild(head);

      if (!isOpen) return;
      items.forEach(function (v) { listEl.appendChild(makeCard(v)); });
    });
  }

  function renderEditor() {
    var v = selected();
    editorEl.innerHTML = "";

    if (!v) {
      var empty = document.createElement("div");
      empty.className = "editor-empty";
      empty.innerHTML = '<div class="big">No video selected</div>' +
        '<div>Pick an idea on the left, or create a new one to start scripting.</div>';
      editorEl.appendChild(empty);
      return;
    }

    var scroll = document.createElement("div");
    scroll.className = "editor-scroll";
    var inner = document.createElement("div");
    inner.className = "editor-inner";

    var title = document.createElement("input");
    title.className = "title-input";
    title.placeholder = "Video title…";
    title.value = v.title;
    title.oninput = function () { patch("title", title.value); renderList(); };

    var toolbar = document.createElement("div");
    toolbar.className = "toolbar";

    var group = document.createElement("div");
    group.className = "status-group";
    STATUSES.forEach(function (s) {
      var b = document.createElement("button");
      b.className = "status-opt " + (v.status === s ? "sel " + s : "");
      b.textContent = s;
      b.onclick = function () { patch("status", s); renderAll(); };
      group.appendChild(b);
    });

    var starBtn = document.createElement("button");
    starBtn.className = "star-btn" + (v.starred ? " on" : "");
    starBtn.textContent = "★";
    starBtn.title = v.starred ? "Starred — click to remove" : "Star this idea";
    starBtn.onclick = function () { patch("starred", !v.starred); renderAll(); };

    var spacer = document.createElement("div");
    spacer.className = "spacer";

    var copyBtn = document.createElement("button");
    copyBtn.className = "ghost-btn";
    copyBtn.textContent = "Copy script";
    copyBtn.onclick = function () { copyToClipboard(buildScriptText(v), copyBtn); };

    var delBtn = document.createElement("button");
    delBtn.className = "ghost-btn danger";
    delBtn.textContent = "Delete";
    delBtn.onclick = function () {
      if (confirm("Delete this video idea? This can't be undone.")) deleteVideo(v.id);
    };

    toolbar.appendChild(group);
    toolbar.appendChild(starBtn);
    toolbar.appendChild(spacer);
    toolbar.appendChild(copyBtn);
    toolbar.appendChild(delBtn);

    // folder picker (autocompletes existing folders, accepts new ones)
    var folderRow = document.createElement("div");
    folderRow.className = "folder-row";
    var fl = document.createElement("span");
    fl.className = "fl";
    fl.textContent = "📁";
    var fInput = document.createElement("input");
    fInput.className = "folder-input";
    fInput.setAttribute("list", "folderList");
    fInput.placeholder = "No folder — type one (e.g. Ads, UGC)";
    fInput.value = v.folder || "";
    fInput.onchange = function () { patch("folder", fInput.value.trim()); renderList(); };
    var dl = document.createElement("datalist");
    dl.id = "folderList";
    folderNames().forEach(function (nm) {
      var o = document.createElement("option");
      o.value = nm;
      dl.appendChild(o);
    });
    folderRow.appendChild(fl);
    folderRow.appendChild(fInput);
    folderRow.appendChild(dl);

    inner.appendChild(title);
    inner.appendChild(toolbar);
    inner.appendChild(folderRow);
    inner.appendChild(makeSection("Concept", "concept", v.concept || "", "concept-area",
      "e.g. “Why most workout apps make logging harder than a notebook.”"));
    inner.appendChild(makeSection("Hook", "hook", v.hook, "hook-area",
      "e.g. “Most people log workouts wrong. Here’s the 5-second fix.”"));
    inner.appendChild(makeSection("Body", "body", v.body, "body-area",
      "Beat-by-beat what you say and show…"));
    inner.appendChild(makeSection("CTA", "cta", v.cta, "cta-area",
      "e.g. “Download Build free — link in bio.”"));

    scroll.appendChild(inner);
    editorEl.appendChild(scroll);

    var areas = editorEl.querySelectorAll("textarea");
    for (var i = 0; i < areas.length; i++) autosize(areas[i]);
  }

  function autosize(ta) {
    ta.style.height = "auto";
    ta.style.height = ta.scrollHeight + "px";
  }

  function makeSection(label, field, value, areaClass, placeholder) {
    var sec = document.createElement("div");
    sec.className = "section";
    var lab = document.createElement("div");
    lab.className = "section-label";
    lab.textContent = label;
    var ta = document.createElement("textarea");
    ta.className = areaClass;
    ta.placeholder = placeholder;
    ta.value = value;
    ta.oninput = function () { patch(field, ta.value); autosize(ta); };
    sec.appendChild(lab);
    sec.appendChild(ta);
    return sec;
  }

  function buildScriptText(v) {
    var lines = [];
    lines.push(v.title.trim() || "Untitled idea");
    lines.push("Status: " + v.status);
    lines.push("");
    lines.push("CONCEPT");
    lines.push((v.concept || "").trim() || "—");
    lines.push("");
    lines.push("HOOK");
    lines.push(v.hook.trim() || "—");
    lines.push("");
    lines.push("BODY");
    lines.push(v.body.trim() || "—");
    lines.push("");
    lines.push("CTA");
    lines.push(v.cta.trim() || "—");
    return lines.join("\n");
  }

  function copyToClipboard(text, btn) {
    var done = function () {
      var orig = btn.textContent;
      btn.textContent = "Copied!";
      setTimeout(function () { btn.textContent = orig; }, 1200);
    };
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(done, function () { fallbackCopy(text, done); });
    } else {
      fallbackCopy(text, done);
    }
  }
  function fallbackCopy(text, done) {
    var ta = document.createElement("textarea");
    ta.value = text;
    ta.style.position = "fixed";
    ta.style.opacity = "0";
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand("copy"); done(); } catch (e) { /* noop */ }
    document.body.removeChild(ta);
  }

  function renderAll() { renderList(); renderEditor(); }

  // ---- auth UI ----
  var gate = document.getElementById("gate");
  var sidebar = document.getElementById("sidebar");
  var gateMsg = document.getElementById("gateMsg");
  var emailInput = document.getElementById("emailInput");
  var loginBtn = document.getElementById("loginBtn");

  function showGate() {
    gate.classList.remove("hidden");
    sidebar.classList.add("hidden");
    editorEl.classList.add("hidden");
  }
  function showApp() {
    gate.classList.add("hidden");
    sidebar.classList.remove("hidden");
    editorEl.classList.remove("hidden");
  }

  loginBtn.onclick = function () {
    var email = (emailInput.value || "").trim();
    if (!email) { gateMsg.className = "gate-msg err"; gateMsg.textContent = "Enter your email first."; return; }
    loginBtn.disabled = true;
    gateMsg.className = "gate-msg";
    gateMsg.textContent = "Sending…";
    sb.auth.signInWithOtp({
      email: email,
      options: { emailRedirectTo: location.href.split("#")[0] }
    }).then(function (res) {
      loginBtn.disabled = false;
      if (res.error) {
        gateMsg.className = "gate-msg err";
        gateMsg.textContent = res.error.message;
      } else {
        gateMsg.className = "gate-msg ok";
        gateMsg.textContent = "Check your email and tap the sign-in link. You can close this tab.";
      }
    });
  };
  emailInput.onkeydown = function (e) { if (e.key === "Enter") loginBtn.click(); };

  document.getElementById("signoutBtn").onclick = function () {
    sb.auth.signOut();
  };

  var booted = false;
  function bootApp(session) {
    state.user = session.user;
    document.getElementById("userEmail").textContent = session.user.email || "";
    showApp();
    if (booted) return;
    booted = true;
    syncDot.textContent = "loading…";
    loadVideos()
      .then(seedFromRepo)
      .then(loadVideos)
      .then(function () {
        if (state.selectedId && !selected()) state.selectedId = null;
        if (!state.selectedId && state.videos[0]) state.selectedId = state.videos[0].id;
        renderAll();
        syncDot.textContent = "saved";
      })
      .catch(function () { syncDot.textContent = "couldn't load — refresh"; });
  }

  // wire app controls
  document.getElementById("newBtn").onclick = createVideo;
  document.getElementById("search").oninput = function (e) {
    state.query = e.target.value;
    renderList();
  };

  // auth lifecycle
  sb.auth.onAuthStateChange(function (event, session) {
    if (session && session.user) {
      bootApp(session);
    } else {
      booted = false;
      state.videos = [];
      state.user = null;
      state.selectedId = null;
      showGate();
    }
  });

  sb.auth.getSession().then(function (res) {
    var session = res.data && res.data.session;
    if (session && session.user) bootApp(session);
    else showGate();
  });
})();
</script>
</body>
</html>
